<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virotikly | Scale Your Content</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff0050; 
      --neon: #00f2ea;
      --bg: #000000;
      --card-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-dim: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    h1, h2, h3, .logo { font-family: 'Space Grotesk', sans-serif; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(255, 0, 80, 0.1), transparent 30%),
        radial-gradient(circle at 90% 90%, rgba(0, 242, 234, 0.05), transparent 30%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      padding: 20px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; }
    .logo span { color: var(--primary); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      flex-grow: 1;
    }

    .bento-card {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .field-group { margin-bottom: 25px; }
    label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; display: block; }
    
    select, input, textarea {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      padding: 16px;
      border-radius: 16px;
      color: #fff;
    }

    .btn-publish {
      background: #fff;
      color: #000;
      width: 100%;
      padding: 20px;
      border-radius: 100px;
      font-weight: 800;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-publish:hover { background: var(--primary); color: #fff; }

    .side-stack { display: flex; flex-direction: column; gap: 20px; }
    .mini-card { background: var(--card-bg); border-radius: 24px; padding: 25px; border: 1px solid var(--glass-border); }

    .legal-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 10px;
      transition: 0.3s;
    }
    .legal-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Support Modal */
    #supportModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; }
    .modal-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 40px; border-radius: 30px; width: 90%; max-width: 400px; border: 1px solid var(--glass-border); text-align: center; }
    
    .wa-link { background: #25D366; color: white; display: block; padding: 15px; border-radius: 100px; text-decoration: none; font-weight: 700; margin-top: 20px; }

    footer {
      padding: 40px 20px;
      text-align: center;
      border-top: 1px solid var(--glass-border);
      margin-top: auto;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .footer-links a {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.8rem;
      transition: 0.3s;
    }

    .footer-links a:hover { color: var(--primary); }
  </style>
</head>
<body>

  <nav>
    <div class="logo">VIRO<span>TIKLY</span></div>
    <div onclick="toggleSupport()" style="cursor:pointer; font-weight: 700; font-size: 0.8rem; letter-spacing: 1px;">SUPPORT</div>
  </nav>

  <div class="dashboard-grid">
    <main class="bento-card">
      <h2 style="margin-bottom: 30px;">Campaign Builder</h2>
      <form id="cmsForm">
        <div class="field-group">
          <label>Source</label>
          <select id="video_source"><option value="local">Direct Upload</option><option value="cloud">Cloud URL</option></select>
        </div>
        <div class="field-group" id="file_in"><label>Video File</label><input type="file" id="local_file"></div>
        <div class="field-group" id="url_in" style="display:none;"><label>Cloud URL</label><input type="text" id="remote_url"></div>
        <div class="field-group"><label>Caption</label><textarea id="caption" rows="4" required></textarea></div>
        <button type="submit" class="btn-publish">Execute Publishing</button>
      </form>
    </main>

    <aside class="side-stack">
      <div class="mini-card">
        <label>Account Identity</label>
        <button class="btn-publish" style="padding: 12px; font-size: 0.9rem;">Authenticate TikTok</button>
      </div>

      <div class="mini-card">
        <label>Legal & Policy</label>
        <a href="privacy.html" class="legal-btn">Privacy Policy</a>
        <a href="terms.html" class="legal-btn">Terms of Service</a>
      </div>

      <div class="mini-card" onclick="toggleSupport()" style="cursor:pointer; border-color: var(--primary);">
        <h4 style="color: var(--primary); font-size: 0.9rem;">Need Help?</h4>
        <p style="font-size: 0.75rem; color: var(--text-dim); margin-top: 5px;">Click to chat with the developer.</p>
      </div>
    </aside>
  </div>

  <div id="supportModal">
    <div class="modal-box">
      <h2>Developer Support</h2>
      <a href="https://wa.me/2349169292033" target="_blank" class="wa-link">WhatsApp Developer</a>
      <a href="mailto:your-email@gmail.com" style="display:block; margin-top:15px; color:white; text-decoration:none; font-size:0.9rem;">Email Support</a>
      <p onclick="toggleSupport()" style="margin-top:30px; cursor:pointer; font-size:0.8rem; color:var(--text-dim)">Close</p>
    </div>
  </div>

  <footer>
    <p style="font-size: 0.8rem; color: var(--text-dim);">&copy; 2026 Virotikly Dashboard. Built for creators.</p>
    <div class="footer-links">
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="#" onclick="toggleSupport()">Support</a>
    </div>
  </footer>

  <script>
    const source = document.getElementById('video_source');
    source.onchange = () => {
      document.getElementById('file_in').style.display = source.value === 'local' ? 'block' : 'none';
      document.getElementById('url_in').style.display = source.value === 'cloud' ? 'block' : 'none';
    };
    function toggleSupport() {
      const m = document.getElementById('supportModal');
      m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
