<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virotikly | Content Evolution</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@400;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff0050; 
      --neon: #00f2ea;
      --deep-bg: #000000;
      --glass: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
    h1, h2, .logo { font-family: 'Space Grotesk', sans-serif; text-transform: lowercase; }

    body {
      background-color: var(--deep-bg);
      color: #fff;
      overflow-x: hidden;
      background-image: radial-gradient(circle at 80% 20%, rgba(255, 0, 80, 0.15), transparent 40%);
    }

    /* Floating Nav */
    nav {
      padding: 20px 6%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(20px);
      z-index: 1000;
      border-bottom: 1px solid var(--border);
    }

    .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -1.5px; }
    .logo span { color: var(--primary); }

    /* Ultra-Clean Hero */
    .hero {
      padding: 80px 8% 40px;
      text-align: left;
    }

    .hero h1 { font-size: 3.5rem; line-height: 0.9; letter-spacing: -3px; margin-bottom: 15px; }
    .hero p { color: #888; font-size: 1.1rem; max-width: 300px; }

    /* Spread Out Sections */
    section { padding: 40px 6%; }

    .card-label {
      font-size: 0.7rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 2px;
      margin-bottom: 15px;
      display: block;
    }

    /* Identity Card */
    .auth-card {
      background: var(--glass);
      border: 1px solid var(--border);
      padding: 30px;
      border-radius: 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-tiktok {
      background: #fff;
      color: #000;
      padding: 12px 24px;
      border-radius: 100px;
      font-weight: 800;
      font-size: 0.8rem;
      border: none;
      cursor: pointer;
    }

    /* Form Design - Spacious & Sharp */
    .upload-container {
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
      border-top: 1px solid var(--border);
      border-radius: 40px 40px 0 0;
      padding: 50px 6% 100px;
    }

    .input-wrap { margin-bottom: 35px; }
    
    select, input, textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border);
      padding: 15px 0;
      color: #fff;
      font-size: 1.2rem;
      transition: 0.4s;
      border-radius: 0;
    }

    select:focus, input:focus, textarea:focus { 
      outline: none; 
      border-bottom-color: var(--neon);
    }

    .schedule-box {
      background: var(--glass);
      padding: 25px;
      border-radius: 25px;
      margin-top: 20px;
    }

    .btn-submit {
      background: var(--primary);
      color: #fff;
      width: 100%;
      padding: 22px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 1.1rem;
      border: none;
      margin-top: 40px;
      box-shadow: 0 15px 30px rgba(255, 0, 80, 0.3);
    }

    /* Fixed Bottom Legal/Support Links */
    .footer-dock {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      font-size: 0.75rem;
      background: #000;
    }
    
    .footer-dock a { color: #555; text-decoration: none; font-weight: 600; }

    /* Support Modal */
    #supportBox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      padding: 40px;
    }

    .modal-inner { margin-top: 100px; }
    .modal-inner h2 { font-size: 3rem; letter-spacing: -2px; margin-bottom: 20px; }
    .wa-big { color: var(--neon); font-size: 1.5rem; text-decoration: none; font-weight: 800; display: block; margin-top: 20px; }

  </style>
</head>
<body>

  <nav>
    <div class="logo">viro<span>tikly</span></div>
    <div onclick="toggleSupport()" style="font-weight: 800; font-size: 0.7rem; letter-spacing: 1px; color: var(--neon);">HELP</div>
  </nav>

  <header class="hero">
    <span class="card-label">READY TO POST?</span>
    <h1>scale <br>your <br>vibe.</h1>
    <p>automated tiktok flow for the next gen of creators.</p>
  </header>

  <section>
    <div class="auth-card">
      <div>
        <h4 style="font-size: 1rem;">Account</h4>
        <p style="font-size: 0.7rem; color: #888;">Status: Disconnected</p>
      </div>
      <button class="btn-tiktok" onclick="connectTikTok()">CONNECT</button>
    </div>
  </section>

  <main class="upload-container">
    <form id="cmsForm">
      <div class="input-wrap">
        <label class="card-label">SOURCE</label>
        <select id="video_source">
          <option value="local">Local Gallery</option>
          <option value="cloud">Cloud URL</option>
        </select>
      </div>

      <div class="input-wrap" id="file_in">
        <label class="card-label">MEDIA</label>
        <input type="file" id="local_file">
      </div>

      <div class="input-wrap" id="url_in" style="display:none;">
        <label class="card-label">REMOTE LINK</label>
        <input type="text" id="remote_url" placeholder="https://...">
      </div>

      <div class="input-wrap">
        <label class="card-label">CAPTION</label>
        <textarea id="caption" rows="2" placeholder="Write it..."></textarea>
      </div>

      <div class="schedule-box">
        <div style="display:flex; justify-content: space-between; align-items: center;">
          <span style="font-weight: 800; font-size: 0.8rem;">SCHEDULE?</span>
          <input type="checkbox" id="is_scheduled" style="width: 25px; height: 25px;">
        </div>
        <input type="datetime-local" id="publish_at" style="display:none; font-size: 1rem; border-bottom: 1px solid #333;">
      </div>

      <button type="submit" class="btn-submit">PUBLISH NOW</button>
    </form>
  </main>

  <div id="supportBox">
    <div class="modal-inner">
      <span class="card-label">SUPPORT</span>
      <h2>got <br>issues?</h2>
      <a href="https://wa.me/2349169292033" class="wa-big">WHATSAPP DEVELOPER</a>
      <a href="mailto:your@email.com" style="color:#fff; display:block; margin-top:20px; font-weight:800;">EMAIL US</a>
      <p onclick="toggleSupport()" style="margin-top:50px; color: var(--primary); font-weight: 800;">[ CLOSE ]</p>
    </div>
  </div>

  <div class="footer-dock">
    <a href="privacy.html">PRIVACY</a>
    <span>/</span>
    <a href="terms.html">TERMS</a>
    <span>/</span>
    <a href="#" onclick="toggleSupport()">SUPPORT</a>
  </div>

  <script>
    const source = document.getElementById('video_source');
    const sched = document.getElementById('is_scheduled');

    source.onchange = () => {
      document.getElementById('file_in').style.display = source.value === 'local' ? 'block' : 'none';
      document.getElementById('url_in').style.display = source.value === 'cloud' ? 'block' : 'none';
    };

    sched.onchange = () => {
      document.getElementById('publish_at').style.display = sched.checked ? 'block' : 'none';
    };

    function toggleSupport() {
      const m = document.getElementById('supportBox');
      m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function connectTikTok() {
      // Your TikTok Auth Logic
    }
  </script>
</body>
</html>
